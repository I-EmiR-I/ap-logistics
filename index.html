  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

acenaje y Logística<\u002Fh3>\n        <\u002Fdiv>\n        <ul style=\"list-style:none; margin:0; padding:0; font-size:16px; line-height:2.2; font-weight:600;\">\n          <li>— Almacenaje estratégico con inventario en tiempo real<\u002Fli>\n          <li>— Manejo especializado con protocolos certificados<\u002Fli>\n          <li>— Seguimiento satelital 24/7<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 5. FILOSOFÍA -->\n  <section data-screen-label=\"05 — Filosofía\" style=\"position:relative; padding:160px 48px; max-width:1440px; margin:0 auto; display:grid; grid-template-columns:0.9fr 1.1fr; gap:80px; align-items:center;\">\n    <div class=\"reveal-up\" style=\"aspect-ratio:4/5; border-radius:2px; overflow:hidden; background:repeating-linear-gradient(70deg, #17191c 0px, #17191c 2px, #1d2024 2px, #1d2024 4px); border:1px solid #2a2c30; display:flex; align-items:center; justify-content:center;\">\n      <span style=\"font-family:monospace; font-size:12px; color:#5c5f63; text-align:center; padding:0 24px;\">Personal operativo en andén de carga<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"reveal-up\">\n      <div style=\"font-size:13px; letter-spacing:0.25em; text-transform:uppercase; color:#ff5a1f; font-weight:700; margin-bottom:28px;\">Nuestra Filosofía<\u002Fdiv>\n      <p style=\"font-family:'Archivo',sans-serif; font-weight:500; font-style:italic; font-size:clamp(24px,2.6vw,36px); line-height:1.4; color:#f2efe9; margin:0;\">\n        En AP Logistics, nos guía un compromiso inquebrantable con la excelencia operativa, la seguridad y la puntualidad en cada entrega. Creemos que cada carga representa la confianza de nuestros clientes.\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 6. EQUIPO DIRECTIVO -->\n  <section data-screen-label=\"06 — Equipo\" ref=\"{{ teamSectionRef }}\" style=\"position:relative; padding:160px 48px 200px; max-width:1440px; margin:0 auto;\">\n    <h2 class=\"reveal-up\" style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:clamp(36px,5vw,64px); margin:0 0 80px; letter-spacing:-0.01em;\">Equipo Directivo<\u002Fh2>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:32px;\">\n      <sc-for list=\"{{ team }}\" as=\"m\" hint-placeholder-count=\"2\">\n        <div class=\"reveal-up\" style=\"position:relative; border:1px solid #24262a; border-radius:2px; overflow:hidden; background:#101215;\" style-hover=\"border-color:#ff5a1f;\">\n          <div style=\"aspect-ratio:4/5; background:repeating-linear-gradient(60deg, #16181b 0px, #16181b 2px, #1c1e22 2px, #1c1e22 4px); display:flex; align-items:center; justify-content:center; position:relative;\">\n            <span style=\"font-family:monospace; font-size:12px; color:#5c5f63; text-align:center; padding:0 16px;\">{{ m.placeholderNote }}<\u002Fspan>\n            <div style=\"position:absolute; inset:0; opacity:0; transition:opacity 0.3s ease; display:flex; align-items:center; justify-content:center; background:rgba(10,11,13,0.92); padding:36px;\" style-hover=\"opacity:1;\">\n              <p style=\"font-size:15px; line-height:1.7; color:#c4c0b6; margin:0;\">{{ m.detail }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:24px 28px;\">\n            <div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:20px;\">{{ m.name }}<\u002Fdiv>\n            <div style=\"font-size:13px; letter-spacing:0.05em; text-transform:uppercase; color:#ff5a1f; margin-top:6px;\">{{ m.role }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 7. CTA / FOOTER -->\n  <footer data-screen-label=\"07 — Contacto\" style=\"position:relative; padding:140px 48px 64px; background:#050506; border-top:1px solid #1c1e22;\">\n    <div class=\"reveal-up\" style=\"max-width:1440px; margin:0 auto;\">\n      <h2 style=\"font-family:'Archivo',sans-serif; font-weight:900; font-size:clamp(40px,8vw,120px); line-height:0.95; letter-spacing:-0.02em; margin:0 0 64px;\">\n        MUEVE TU<br>CARGA CON<br><span style=\"color:#ff5a1f;\">CONFIANZA.<\u002Fspan>\n      <\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:repeat(3, 1fr); gap:32px; border-top:1px solid #1c1e22; padding-top:40px;\">\n        <div>\n          <div style=\"font-size:12px; letter-spacing:0.15em; text-transform:uppercase; color:#7a766e; margin-bottom:10px;\">Sitio Web<\u002Fdiv>\n          <a href=\"https://www.aplogistics.com.mx\" style=\"color:#f2efe9; text-decoration:none; font-size:18px; font-weight:600;\">www.aplogistics.com.mx<\u002Fa>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:12px; letter-spacing:0.15em; text-transform:uppercase; color:#7a766e; margin-bottom:10px;\">Contacto Directo<\u002Fdiv>\n          <a href=\"tel:+528129803781\" style=\"color:#f2efe9; text-decoration:none; font-size:18px; font-weight:600;\">+52 812 980 3781<\u002Fa>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:12px; letter-spacing:0.15em; text-transform:uppercase; color:#7a766e; margin-bottom:10px;\">Correo Electrónico<\u002Fdiv>\n          <a href=\"mailto:ventas@aplogistics.com.mx\" style=\"color:#f2efe9; text-decoration:none; font-size:18px; font-weight:600;\">ventas@aplogistics.com.mx<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:80px; font-size:12px; color:#5c5f63;\">© 2026 AP Logistics — Soluciones Integrales de Transporte y Logística.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;particleDensity&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 800, &quot;min&quot;: 200, &quot;max&quot;: 1500, &quot;step&quot;: 100, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Movimiento&quot;},\n  &quot;reduceMotion&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Movimiento&quot;}\n}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.rootRef = React.createRef();\n    this.cursorDotRef = React.createRef();\n    this.cursorRingRef = React.createRef();\n    this.heroCanvasRef = React.createRef();\n    this.pinSectionRef = React.createRef();\n    this.doorLeftRef = React.createRef();\n    this.doorRightRef = React.createRef();\n    this.teamSectionRef = React.createRef();\n\n    this.pillarRefs = [React.createRef(), React.createRef(), React.createRef(), React.createRef()];\n\n    this.pillarsData = [\n      { num: '01', title: 'Tecnología de Punta', desc: 'Sistemas de telemetría avanzada, GPS satelital y monitoreo en tiempo real.' },\n      { num: '02', title: 'Eficiencia Operativa', desc: 'Motores de bajo consumo y alta potencia que optimizan cada kilómetro.' },\n      { num: '03', title: 'Seguridad Garantizada', desc: 'Cajas secas con sellos electrónicos y rastreo las 24 horas.' },\n      { num: '04', title: 'Cobertura Nacional', desc: 'Red de rutas estratégicas conectando los principales CEDIS del país.' }\n    ];\n\n    this.teamData = [\n      { name: 'Alfredo Puente', role: 'Director General', placeholderNote: 'public/alfredo-puente.png — retrato director general', detail: 'Dirección estratégica, relaciones de negocio a largo plazo y una filosofía constante de mejora continua en cada operación.' },\n      { name: 'Angel Martínez', role: 'Coordinador de Logística y Desarrollo Comercial', placeholderNote: 'public/angel-martinez.png — retrato coordinador', detail: 'Monitoreo directo de unidades, seguimiento documental y atención comercial activa con clientes clave.' }\n    ];\n\n    this._raf = null;\n    this._three = null;\n  }\n\n  onCardMove(e) {\n    const el = e.currentTarget;\n    const r = el.getBoundingClientRect();\n    const x = (e.clientX - r.left) / r.width - 0.5;\n    const y = (e.clientY - r.top) / r.height - 0.5;\n    el.style.transform = `perspective(700px) rotateY(${x * 10}deg) rotateX(${-y * 10}deg) translateZ(6px)`;\n  }\n\n  onCardLeave(e) {\n    e.currentTarget.style.transform = 'perspective(700px) rotateY(0deg) rotateX(0deg) translateZ(0)';\n  }\n\n  componentDidMount() {\n    if (this._didInit) return;\n    this._didInit = true;\n    this._mounted = true;\n    this._waitForLibs().then(() => {\n      if (!this._mounted) return;\n      this._initCursor();\n      this._initLenisAndScrollTrigger();\n      this._initHeroParticles();\n      setTimeout(() => {\n        if (!this._mounted) return;\n        this._initDoorReveal();\n        this._initReveals();\n        ScrollTrigger.refresh();\n      }, 150);\n    });\n  }\n\n  componentWillUnmount() {\n    this._mounted = false;\n    if (this._raf) cancelAnimationFrame(this._raf);\n    window.removeEventListener('mousemove', this._onMouseMove);\n    if (this._onScroll) {\n      window.removeEventListener('scroll', this._onScroll);\n      document.removeEventListener('scroll', this._onScroll);\n    }\n    if (this._scrollPollInterval) clearInterval(this._scrollPollInterval);\n    if (this._revealPollInterval) clearInterval(this._revealPollInterval);\n  }\n\n  _waitForLibs() {\n    return new Promise((resolve) => {\n      const check = () => {\n        if (window.gsap && window.ScrollTrigger && window.THREE) resolve();\n        else setTimeout(check, 60);\n      };\n      check();\n    });\n  }\n\n  _initCursor() {\n    const dot = this.cursorDotRef.current;\n    const ring = this.cursorRingRef.current;\n    let rx = 0, ry = 0, tx = 0, ty = 0;\n    this._onMouseMove = (e) => {\n      if (dot) { dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px'; }\n      tx = e.clientX; ty = e.clientY;\n    };\n    window.addEventListener('mousemove', this._onMouseMove);\n    const tick = () => {\n      rx += (tx - rx) * 0.15;\n      ry += (ty - ry) * 0.15;\n      if (ring) { ring.style.left = rx + 'px'; ring.style.top = ry + 'px'; }\n      this._ringRaf = requestAnimationFrame(tick);\n    };\n    tick();\n  }\n\n  _initLenisAndScrollTrigger() {\n    gsap.registerPlugin(ScrollTrigger);\n    document.documentElement.style.scrollBehavior = 'auto';\n    this._onScroll = () => ScrollTrigger.update();\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    document.addEventListener('scroll', this._onScroll, { passive: true });\n    // setInterval (not rAF) drives the fallback: some automation/capture\n    // contexts never fire scroll events or animation frames between a\n    // programmatic scroll and a snapshot, but timers still run reliably.\n    let lastY = -1;\n    this._scrollPollInterval = setInterval(() => {\n      if (window.scrollY !== lastY) { lastY = window.scrollY; ScrollTrigger.update(); }\n    }, 80);\n  }\n\n  _initHeroParticles() {\n    const canvas = this.heroCanvasRef.current;\n    if (!canvas) return;\n    const THREE = window.THREE;\n    const density = Math.max(200, Math.min(1500, this.props.particleDensity ?? 800));\n    const width = canvas.clientWidth || window.innerWidth;\n    const height = canvas.clientHeight || window.innerHeight;\n\n    const scene = new THREE.Scene();\n    const camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 1000);\n    camera.position.z = 60;\n\n    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });\n    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n    renderer.setSize(width, height);\n\n    const count = density;\n    const positions = new Float32Array(count * 3);\n    const speeds = new Float32Array(count);\n    for (let i = 0; i < count; i++) {\n      positions[i * 3] = (Math.random() - 0.5) * 140;\n      positions[i * 3 + 1] = (Math.random() - 0.5) * 80;\n      positions[i * 3 + 2] = (Math.random() - 0.5) * 80;\n      speeds[i] = 0.05 + Math.random() * 0.15;\n    }\n    const geo = new THREE.BufferGeometry();\n    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));\n    const mat = new THREE.PointsMaterial({ color: 0xff5a1f, size: 0.6, transparent: true, opacity: 0.75 });\n    const points = new THREE.Points(geo, mat);\n    scene.add(points);\n\n    const mat2 = new THREE.PointsMaterial({ color: 0xf2efe9, size: 0.35, transparent: true, opacity: 0.35 });\n    const points2 = new THREE.Points(geo.clone(), mat2);\n    points2.scale.set(1.4, 1.4, 1.4);\n    scene.add(points2);\n\n    let mouseX = 0, mouseY = 0;\n    const onMove = (e) => {\n      mouseX = (e.clientX / window.innerWidth - 0.5) * 2;\n      mouseY = (e.clientY / window.innerHeight - 0.5) * 2;\n    };\n    window.addEventListener('mousemove', onMove);\n    this._heroMoveHandler = onMove;\n\n    const posAttr = geo.attributes.position;\n    const animate = () => {\n      const arr = posAttr.array;\n      for (let i = 0; i < count; i++) {\n        arr[i * 3] += speeds[i];\n        if (arr[i * 3] > 70) arr[i * 3] = -70;\n      }\n      posAttr.needsUpdate = true;\n      points.rotation.y += 0.0006;\n      points2.rotation.y -= 0.0004;\n      camera.position.x += (mouseX * 8 - camera.position.x) * 0.03;\n      camera.position.y += (-mouseY * 5 - camera.position.y) * 0.03;\n      camera.lookAt(0, 0, 0);\n      renderer.render(scene, camera);\n      this._raf = requestAnimationFrame(animate);\n    };\n    animate();\n\n    const onResize = () => {\n      const w = canvas.clientWidth || window.innerWidth;\n      const h = canvas.clientHeight || window.innerHeight;\n      camera.aspect = w / h;\n      camera.updateProjectionMatrix();\n      renderer.setSize(w, h);\n    };\n    window.addEventListener('resize', onResize);\n    this._heroResizeHandler = onResize;\n  }\n\n  _initDoorReveal() {\n    const pin = this.pinSectionRef.current;\n    const left = this.doorLeftRef.current;\n    const right = this.doorRightRef.current;\n    if (!pin || !left || !right) return;\n    gsap.timeline({\n      scrollTrigger: {\n        trigger: pin,\n        start: 'top top',\n        end: '+=120%',\n        scrub: true,\n        pin: true\n      }\n    })\n    .to(left, { xPercent: -100, ease: 'none' }, 0)\n    .to(right, { xPercent: 100, ease: 'none' }, 0);\n  }\n\n  _initReveals() {\n    const els = Array.from(this.rootRef.current ? this.rootRef.current.querySelectorAll('.reveal-up') : []);\n    els.forEach((el) => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(40px)';\n      el.style.transition = 'opacity 0.9s cubic-bezier(0.16,1,0.3,1), transform 0.9s cubic-bezier(0.16,1,0.3,1)';\n    });\n    const pending = new Set(els);\n    const checkAll = () => {\n      const vh = window.innerHeight || document.documentElement.clientHeight;\n      pending.forEach((el) => {\n        const r = el.getBoundingClientRect();\n        if (r.top < vh * 0.9) {\n          el.style.opacity = '1';\n          el.style.transform = 'translateY(0)';\n          pending.delete(el);\n        }\n      });\n    };\n    checkAll();\n    // setInterval, not IntersectionObserver/rAF: those require the browser's\n    // real paint loop, which some capture/automation contexts never run\n    // between a programmatic scroll and a snapshot.\n    this._revealPollInterval = setInterval(() => {\n      if (pending.size === 0) { clearInterval(this._revealPollInterval); return; }\n      checkAll();\n    }, 80);\n  }\n\n  renderVals() {\n    return {\n      rootRef: this.rootRef,\n      cursorDotRef: this.cursorDotRef,\n      cursorRingRef: this.cursorRingRef,\n      heroCanvasRef: this.heroCanvasRef,\n      pinSectionRef: this.pinSectionRef,\n      doorLeftRef: this.doorLeftRef,\n      doorRightRef: this.doorRightRef,\n      teamSectionRef: this.teamSectionRef,\n      pillars: this.pillarsData.map((p, i) => ({ ...p, ref: this.pillarRefs[i] })),\n      team: this.teamData,\n      onCardMove: (e) => this.onCardMove(e),\n      onCardLeave: (e) => this.onCardLeave(e)\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
